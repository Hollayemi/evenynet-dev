<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile vs Web Features — Virtual Event Networking Platform</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-info: #e6f1fb;
    --bg-success: #e1f5ee;
    --bg-warning: #faeeda;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #0c447c;
    --text-success: #085041;
    --text-warning: #633806;
    --border: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-info: #0c2a45;
      --bg-success: #04342c;
      --bg-warning: #412402;
      --text-primary: #e8e6dc;
      --text-secondary: #a0a09a;
      --text-tertiary: #68675f;
      --text-info: #85b7eb;
      --text-success: #9fe1cb;
      --text-warning: #fac775;
      --border: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.18);
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 32px 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }

  .top-tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); margin-bottom: 20px; }
  .utab {
    padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; background: none; color: var(--text-secondary);
    border-bottom: 2.5px solid transparent; margin-bottom: -0.5px;
    font-family: var(--font); transition: all .15s;
  }
  .utab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }

  .plat-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 680px) { .plat-wrap { grid-template-columns: 1fr; } }

  .plat-col { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .plat-head {
    padding: 12px 14px; border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .plat-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .plat-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .plat-sub { font-size: 11px; color: var(--text-secondary); }

  .cat-section { border-bottom: 0.5px solid var(--border); }
  .cat-section:last-child { border-bottom: none; }
  .cat-head {
    padding: 8px 14px; font-size: 10px; font-weight: 500;
    letter-spacing: .05em; color: var(--text-tertiary);
    background: var(--bg-secondary);
  }
  .feat-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background .12s;
    border-bottom: 0.5px solid var(--border);
  }
  .feat-item:last-child { border-bottom: none; }
  .feat-item:hover { background: var(--bg-secondary); }
  .feat-item.selected { background: var(--bg-info); }
  .feat-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .feat-name { font-size: 12px; font-weight: 500; color: var(--text-primary); line-height: 1.3; margin-bottom: 2px; }
  .feat-why { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
  .prio {
    font-size: 10px; font-weight: 500; padding: 2px 6px;
    border-radius: 3px; margin-left: 6px; vertical-align: middle;
  }

  .detail-box { margin-top: 16px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; display: none; }
  .detail-head {
    padding: 10px 14px; background: var(--bg-secondary);
    border-bottom: 0.5px solid var(--border);
    font-size: 12px; font-weight: 500; color: var(--text-secondary);
  }
  .detail-body {
    padding: 14px; display: grid;
    grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  @media (max-width: 680px) { .detail-body { grid-template-columns: 1fr; } }
  .detail-card { border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px; }
  .detail-card.full { grid-column: 1 / -1; background: var(--bg-secondary); }
  .detail-card-title {
    font-size: 11px; font-weight: 500; color: var(--text-tertiary);
    margin-bottom: 6px; letter-spacing: .03em;
  }
  .detail-card-body { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .detail-card-body b { font-weight: 500; color: var(--text-primary); }
</style>
</head>

<p class="subtitle">Virtual Event Networking Platform — feature allocation by platform and user role. Click any feature for full detail.</p>

<script>
const data = {
  attendee: {

            detail: { what: 'Display your QR code full-screen in one tap. The recipient scans and lands on your mobile-optimised profile page instantly — no login needed.', why: 'You are face-to-face with 30 seconds of attention. This must work in under 3 seconds, offline, in a noisy venue.', how: 'Pre-render QR into a local SVG/canvas on login. No network call at display time. Cache profile URL as a deep link.', consideration: 'Offline rendering is non-negotiable. Test on low-end Android in poor WiFi. QR must survive screen brightness changes.' } },
          { name: 'NFC tap to connect', why: 'Phone-to-phone profile swap', prio: 'differentiator', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Two attendees tap phones back-to-back. Both receive an instant connection notification with each other\'s profiles.', why: 'Faster than QR for tech-savvy attendees. The "wow" moment that gets talked about. Zero camera friction.', how: 'Web NFC API (Android Chrome only). iOS requires a native app with CoreNFC. Fall back to QR silently if NFC unavailable.', consideration: 'iOS support requires native app, not a web app. Decide early whether mobile is PWA or native.' } },
          { name: 'Live availability status', why: 'Signals open-to-connect right now', prio: 'must-have', prioBg: '#E1F5EE', prioColor: '#085041',
            detail: { what: 'Attendees set a status: "Open to connect", "In a meeting", "Coffee break — come find me". Visible on their profile and the networking map.', why: 'Removes the awkward cold approach. When someone\'s status says "Open to connect", reaching out feels invited, not intrusive.', how: 'Status stored in Redis with a 4-hour TTL (auto-expires). Pushed via WebSocket to the networking map in real time.', consideration: 'Must be easy to change — one tap from the home screen. If changing status takes 3+ steps, nobody uses it.' } },
          { name: 'Connection request & send', why: 'Core networking action on-the-go', prio: 'must-have', prioBg: '#E1F5EE', prioColor: '#085041',
            detail: { what: 'Browse AI match suggestions, view a profile, pick an intention tag, and send a connection request — all within 20 seconds on mobile.', why: 'The core networking action happens in fleeting moments between sessions. Mobile friction = missed connections.', how: 'Optimistic UI — show the request as sent immediately. Reconcile in background. Intent tag picker as a bottom sheet, not a modal.', consideration: 'Back-navigation from the tag picker must not lose the profile. Pre-fill the last used intent tag as default.' } }
        ]
      },
      {
        cat: 'In-venue tools', dot: '#7F77DD',
        features: [
          { name: 'Meeting check-in', why: 'GPS or QR confirms you arrived', prio: 'must-have', prioBg: '#E1F5EE', prioColor: '#085041',
            detail: { what: 'When you arrive at a meeting location, check in via a QR code at the venue or a GPS proximity trigger. Both parties checking in marks the meeting as "occurred".', why: 'Without check-in, analytics cannot distinguish held from no-show meetings. Check-in is also the trigger for credit rewards.', how: 'Option A: venue QR codes (printed at each table). Option B: GPS geofence (100m radius) — simpler for attendees but less precise.', consideration: 'GPS check-in is battery-intensive. Offer QR as primary with GPS as fallback. Never make check-in mandatory before a meeting can be marked held.' } },
          { name: 'Schedule view & reminders', why: 'Day-of schedule in your pocket', prio: 'must-have', prioBg: '#E1F5EE', prioColor: '#085041',
            detail: { what: 'A timeline view of all your scheduled meetings for the event day — with location, who you\'re meeting, and a one-tap "Get directions to table" link.', why: 'Attendees have 4–6 meetings in a day across different rooms. The mobile app is the map and agenda in one.', how: 'Pre-load the full schedule offline at app open. Reminder notifications at 1hr, 30min, and 10min before each meeting.', consideration: 'Time zone display — show all times in the attendee\'s local device timezone, not the event timezone.' } },
          { name: 'Push notifications', why: 'Instant alerts for every action', prio: 'must-have', prioBg: '#E1F5EE', prioColor: '#085041',

          { name: 'Credit wallet quick view', why: 'Check balance before sending requests', prio: 'nice-to-have', prioBg: '#F1EFE8', prioColor: '#444441',

        ]
      }
    ],
    web: [
      {
        cat: 'Discovery & matchmaking', dot: '#378ADD',
        features: [

          { name: 'Deep profile browsing', why: 'Multi-tab research before reaching out', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',

          { name: 'Match quality feedback', why: 'Keyboard input needed for feedback', prio: 'nice-to-have', prioBg: '#F1EFE8', prioColor: '#444441',

        ]

      {

        features: [
          { name: 'Full profile creation', why: 'Long-form input needs a keyboard', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',

          { name: 'LinkedIn profile import', why: 'Click-to-fill on desktop browser', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'One-click OAuth import from LinkedIn: pulls name, headline, current role, company, industry, bio summary, and profile photo.', why: 'Reduces profile completion time from 10 minutes to 90 seconds. Dramatically increases completion rates.', how: 'LinkedIn OAuth 2.0 with r_liteprofile + r_emailaddress + r_basicprofile scopes. Map LinkedIn fields to platform schema.', consideration: 'LinkedIn API rate limits apply per app. Cache the import result — do not re-fetch on every login.' } },
          { name: 'Privacy & visibility settings', why: 'Granular controls need screen space', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'Per-field visibility controls: what is shown to all attendees, to connections only, or hidden. Contact details, company name, and email can be individually toggled.', why: 'Privacy control is a trust feature. Professionals in sensitive job situations (quiet job search, stealth startup) need fine-grained control.', how: 'Visibility bitmask per field stored on profile. Applied at query time — profile API response omits hidden fields for non-connections.', consideration: 'Default visibility should be conservative (connections-only for contact details). Opt-in to full visibility, not opt-out.' } }
        ]
      },
      {
        cat: 'Meeting management', dot: '#1D9E75',
        features: [
          { name: 'Calendar week view', why: 'Meeting grid needs full-width layout', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'A full day/week calendar grid showing all scheduled meetings with time, location, and attendee name. Drag to reschedule. Click to add notes.', why: 'Managing 6 meetings across a 2-day event requires a real calendar view, not a list. Conflict detection needs the grid layout.', how: 'FullCalendar.js or a custom grid. Block-book slots to prevent double-booking. Sync state with Google Calendar API.', consideration: 'Show the event agenda on the same calendar so attendees can plan meetings around sessions they want to attend.' } },
          { name: 'Availability configuration', why: 'Set open hours before the event', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',

      {

        features: [
          { name: 'Full analytics dashboard', why: 'Multi-panel data exploration', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'Comprehensive event analytics: connection graph, meeting rate by hour, top connectors, credit economy activity, sponsor engagement heatmap, ticket sales curve.', why: 'Analytics require charts, filters, date ranges, and cross-metric drill-down — a multi-panel dashboard that only works on a large screen.', how: 'Recharts or Chart.js for visualisation. All metrics pre-aggregated on write. Drill-down routes to filtered tables.', consideration: 'Define metric methodology upfront and document it in the UI. Ambiguity in metric definitions erodes organizer trust.' } },
          { name: 'Attendee management table', why: 'Bulk operations on large datasets', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'Sortable, filterable table of all attendees: name, company, check-in status, connection count, meetings scheduled, profile completeness score. Bulk actions: send credits, send email, export.', why: 'Managing 500+ attendees requires a spreadsheet-like table with multi-select, filters, and bulk actions.', how: 'Virtualised table (react-window or TanStack Virtual) for performance. Server-side sort and filter. Bulk actions via a floating action bar on multi-select.', consideration: 'Export must be GDPR-compliant — only fields the organizer is permitted to export based on attendee consent settings.' } },
          { name: 'Post-event report builder', why: 'PDF export and stakeholder sharing', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'A report template with all key event metrics, auto-populated. Organizers customise the summary text, choose which charts to include, and export as PDF or shareable link.', why: 'Organizers present this report to boards, sponsors, and stakeholders. It needs to look professional and be exportable.', how: 'Puppeteer/headless Chrome PDF generation. Shareable link with a read-only token. Sponsor sections are access-gated by sponsor token.', consideration: 'Snapshot the report at event close — do not re-query live data. Numbers in the report must never change after it is shared.' } },
          { name: 'Sponsor management panel', why: 'Multi-sponsor configuration & oversight', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'View all sponsors, their tier, profile completeness, engagement stats, and rep activity. Edit tiers, issue promo credits, and manage sponsor visibility settings.', why: 'Organizers manage 5–20 sponsors per event. This requires a dedicated panel with per-sponsor stats and controls.', how: 'Sponsor cards with inline stats. Tier change with confirmation. Bulk visibility settings for premium placements.', consideration: 'Organizers must not see the private lead data of a sponsor — only their engagement aggregates (connections, meetings, impressions).' } }
        ]
      },
      {
        cat: 'Sponsor tools', dot: '#BA7517',
        features: [
          { name: 'Visibility tier configuration', why: 'Preview & manage placement', prio: 'must-have', prioBg: '#E6F1FB', prioColor: '#0C447C',
            detail: { what: 'Configure which surfaces each sponsor tier appears on: networking map, AI feed, leaderboard banner, homepage feature. Live preview of each placement.', why: 'Selling visibility tiers requires showing organizers and sponsors exactly what they get before purchase.', how: 'Visibility config stored per sponsor_id x event_id. Preview renders a mock of each placement with the sponsor\'s actual logo and copy.', consideration: 'Cap total sponsored placements per surface (e.g. max 3 featured sponsors on the AI feed) and enforce this cap in the UI.' } },
          { name: 'Prorated billing & invoicing', why: 'Finance workflow needs desktop', prio: 'nice-to-have', prioBg: '#F1EFE8', prioColor: '#444441',
            detail: { what: 'Generate invoices for sponsor packages, send via email, track payment status, and issue credits on payment confirmation.', why: 'Enterprise sponsors require formal invoices and PO-based payment. This is a finance workflow that belongs on web.', how: 'Invoice PDF generation (Puppeteer). Payment status tracked as enum (pending/paid/overdue). Stripe payment links for self-serve payment.', consideration: 'Integrate with Xero or QuickBooks for organizers who need accounting exports. A Zapier webhook is the minimum viable path.' } }
        ]
      }
    ]
  },
  sponsor: {
    mobile: [
      {
        cat: 'Lead capture & follow-up', dot: '#BA7517',
        features: [
          { name: 'QR lead scan', why: 'Scan attendees at your booth', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Rep opens camera, scans an attendee\'s QR card, and the attendee\'s profile and intent tag are instantly added to the rep\'s lead pipeline with a timestamp.', why: 'At a busy booth, reps talk to 30+ people. The QR scan is the fastest way to capture a lead before the conversation ends.', how: 'On scan: create a sponsor_lead record with attendee_id, rep_id, scan_timestamp, event_id. Pre-populate with attendee profile data.', consideration: 'The scan must take under 2 seconds end-to-end. Any friction here and reps stop using it and go back to paper business cards.' } },
          { name: 'Post-meeting notes', why: 'Add notes while memory is fresh', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'After a meeting, the rep gets a push notification with a "Add meeting note" deep link. Tap to add a short note and a status tag (Hot / Warm / Not interested).', why: 'Rep memory is freshest immediately after a meeting. A 30-second note on mobile converts to a qualified CRM lead later.', how: 'Note stored on the meeting record. Push notification fired 2 minutes after meeting end time. Pre-populated with attendee name and meeting time.', consideration: 'Limit note to 280 chars on mobile — reps will not write essays. The status tag is the most important field.' } },
          { name: 'Incoming request notifications', why: 'Respond to leads immediately', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Push notification for every incoming attendee connection request. Tap to view the attendee\'s profile and intent tag, then accept or decline.', why: 'A hot lead who sends a request during a keynote will move on if they get no response for 2 hours. Mobile push is the only way to catch these.', how: 'Push on every request routed to the sponsor company. Rep tap → deep link to request detail → accept/decline actions inline.', consideration: 'Route the push to the most recently active rep, not a broadcast to all reps. Avoid notification flooding on large booths.' } },
          { name: 'Walk-in meeting logger', why: 'Log impromptu booth visits', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Scan an attendee\'s QR code or search by name to instantly create a "walk-in meeting" record: who, when, what was discussed (brief note), and the outcome tag.', why: 'Most booth conversations are unscheduled. Without a logging tool, these meetings are invisible in the analytics.', how: 'Walk-in meeting created with type: "walk_in", attendee_id, rep_id, start_time (now), duration (select: 5/15/30min), note.', consideration: 'Walk-in meetings should appear in both the attendee\'s meeting history and the sponsor\'s lead analytics on equal footing with scheduled meetings.' } }
        ]
      },
      {
        cat: 'Booth management', dot: '#1D9E75',
        features: [
          { name: 'Rep availability toggle', why: 'Signal booth is staffed right now', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Each rep can toggle "Available at booth" on/off. The sponsor profile shows a live green indicator when at least one rep is available.', why: 'Attendees walking past a booth need to know if someone is there to talk. The live availability signal drives walk-in traffic.', how: 'Rep availability stored in Redis with auto-expiry (1 hour idle). Pushed to sponsor profile page via WebSocket.', consideration: 'Auto-set to "unavailable" after 30 minutes of inactivity. Require the rep to actively re-enable so stale availability does not mislead attendees.' } },
          { name: 'Shared lead inbox', why: 'Team pick-up for busy booths', prio: 'nice-to-have', prioBg: '#F1EFE8', prioColor: '#444441',
            detail: { what: 'A shared view where any rep on the team can see and act on unclaimed incoming messages and requests. Claim a lead to assign it to yourself.', why: 'Large sponsors have 5+ reps. Without a shared inbox, a message to the company (not a specific rep) goes unseen.', how: 'Unclaimed leads in a shared queue per sponsor_id. Claiming creates a sponsor_lead record with claiming_rep_id.', consideration: 'Show how long a lead has been unclaimed. Escalate (push all reps) if unclaimed for 30 minutes during active event hours.' } }
        ]
      }
    ],
    web: [
      {
        cat: 'Profile & setup', dot: '#BA7517',
        features: [
          { name: 'Sponsor profile builder', why: 'Rich media content creation', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Full sponsor profile setup: company logo upload, brand description (rich text), product/service listings with screenshots, and rep profile management.', why: 'Uploading logos, writing product descriptions, and adding multiple rep profiles is a 20-minute setup task that requires a desktop.', how: 'Rich text editor (TipTap or ProseMirror) for description. Product listings as a child table with image upload, title, description, tags.', consideration: 'Logo upload must accept SVG and PNG at min 400×400px. Auto-convert to WebP for the CDN. Enforce aspect ratio for consistency in map tiles.' } },
          { name: 'Rep account management', why: 'Add, remove, configure team', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Sponsor admin can invite rep sub-accounts via email, set their role (admin/rep), assign them to specific product lines, and remove them after the event.', why: 'Managing a team of 5 reps, their access levels, and their meeting schedules requires a proper admin panel.', how: 'Rep invites as email tokens. Role-based access: admin sees all leads and analytics; rep sees own pipeline only.', consideration: 'Build an event-scoped permissions model — a rep\'s access expires when the event ends. Do not carry permissions to future events without re-invitation.' } },
          { name: 'Visibility tier upgrade', why: 'Compare tiers and purchase', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'A tier comparison page showing standard vs premium vs enterprise benefits with live previews of each placement. One-click upgrade via Stripe.', why: 'Purchasing decisions — especially at £500+ — are desktop decisions. Sponsors need the full context before upgrading.', how: 'Stripe Checkout for payment. Tier upgrade takes effect immediately after payment confirmation via webhook.', consideration: 'Allow organizer-invoiced payment as an alternative to self-serve card payment — many enterprise sponsors pay via PO/invoice, not card.' } }

      },
      {
        cat: 'Lead analytics', dot: '#378ADD',
        features: [
          { name: 'Full lead analytics dashboard', why: 'Multi-metric data exploration', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Comprehensive sponsor analytics: profile views over time, connection requests by intent tag, message volume, meeting count, rep performance breakdown, and lead funnel conversion.', why: 'ROI analysis requires charts, comparisons, date filtering, and drill-downs — a multi-panel dashboard that only works on web.', how: 'Precomputed aggregate views per sponsor_id x event_id. Recharts for visualisation. Rep-level breakdown in a sortable table.', consideration: 'Sponsor analytics must never show data about other sponsors or raw attendee PII beyond name, role, and company — only engagement data.' } },
          { name: 'Lead list with scoring', why: 'Prioritise follow-up list', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'A sortable table of all leads scored by engagement depth: meeting + positive note (hot) > meeting (warm) > messages (interested) > connection (cold). Filter by rep, intent tag, and score.', why: 'Post-event follow-up efficiency depends on prioritisation. The scored lead list is the output sponsors came to the platform for.', how: 'Lead score computed from interaction events at report generation time. Stored as enum on lead record.', consideration: 'Allow sponsors to override the AI score with a manual rating. Reps have context the system does not.' } },
          { name: 'CSV & CRM export', why: 'Post-event pipeline workflow', prio: 'must-have', prioBg: '#FAEEDA', prioColor: '#633806',
            detail: { what: 'Export all leads as a clean CSV: name, company, role, email (if consented), intent tag, interaction summary, rep notes, lead score. Zapier webhook for real-time CRM push.', why: 'Lead data ends up in Salesforce, HubSpot, or Pipedrive. The export is how sponsors derive long-term value from the event.', how: 'CSV generation as a background job. Email delivery of download link. Zapier webhook publishes on new lead events.', consideration: 'GDPR consent check on every exported record — filter out attendees who did not consent to sponsor data sharing. Log every export with timestamp and rep_id.' } },
          { name: 'Benchmark report', why: 'Justify ROI vs industry', prio: 'nice-to-have', prioBg: '#F1EFE8', prioColor: '#444441',
            detail: { what: 'Add a "how did you compare?" section to the sponsor report: your cost-per-meeting vs platform average, your acceptance rate vs average, your lead score distribution vs benchmark.', why: 'Sponsors need to justify their spend to a marketing director. "We generated 22 meetings at £18 cost-per-meeting vs £47 platform average" is a compelling ROI statement.', how: 'Anonymised benchmark stats computed from all historical events. Percentile rankings per metric. Shown as callout cards in the report.', consideration: 'Benchmarks are only valid for events of similar size and industry. Apply size and category filters before computing the comparison.' } }
        ]
      }
    ]
  }
};

let currentUser = 'attendee';

function buildList(items, platform) {
  return items.map(cat => `
    <div class="cat-section">
      <div class="cat-head">${cat.cat.toUpperCase()}</div>
      ${cat.features.map((f, fi) => {
        const id = `feat-${platform}-${cat.cat.replace(/\W+/g,'_')}-${fi}`;
        const fJson = JSON.stringify(f).replace(/"/g, '&quot;');
        return `<div class="feat-item" id="${id}" onclick="selectFeat(${fJson}, '${id}')">
          <div class="feat-dot" style="background:${cat.dot};margin-top:5px"></div>
          <div style="flex:1;min-width:0">
            <div class="feat-name">${f.name}<span class="prio" style="background:${f.prioBg};color:${f.prioColor}">${f.prio}</span></div>
            <div class="feat-why">${f.why}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function selectFeat(f, elemId) {
  document.querySelectorAll('.feat-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById(elemId);
  if (el) el.classList.add('selected');
  const box = document.getElementById('detail-box');
  document.getElementById('detail-head').textContent = f.name;
  const d = f.detail;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-card"><div class="detail-card-title">WHAT IT IS</div><div class="detail-card-body">${d.what}</div></div>
    <div class="detail-card"><div class="detail-card-title">WHY IT BELONGS HERE</div><div class="detail-card-body">${d.why}</div></div>
    <div class="detail-card"><div class="detail-card-title">HOW TO BUILD IT</div><div class="detail-card-body">${d.how}</div></div>
    <div class="detail-card full"><div class="detail-card-title">KEY CONSIDERATION</div><div class="detail-card-body">${d.consideration}</div></div>`;
  box.style.display = 'block';
}

function setUser(u, el) {
  currentUser = u;
  document.querySelectorAll('.utab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('detail-box').style.display = 'none';
  render();
}

function render() {
  const d = data[currentUser];
  document.getElementById('mobile-list').innerHTML = buildList(d.mobile, 'mob');
  document.getElementById('web-list').innerHTML = buildList(d.web, 'web');
}

render();
</script>
