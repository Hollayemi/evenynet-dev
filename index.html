<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Networking Platform</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #185fa5;
    --border: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-info: #0c2a45;
      --text-primary: #e8e6dc;
      --text-secondary: #a0a09a;
      --text-tertiary: #68675f;
      --text-info: #85b7eb;
      --border: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.18);
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 32px 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }

  .tab-row {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 0;
  }
  .ttab {
    flex: 1;
    max-width: 180px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    border: none;
    border-bottom: 2.5px solid transparent;
    background: none;
    color: var(--text-secondary);
    transition: all .15s;
    font-family: var(--font);
    margin-bottom: -0.5px;
  }
  .ttab.active {
    color: var(--text-primary);
    border-bottom-color: var(--text-primary);
    background: var(--bg-primary);
  }

  .root {
    display: flex;
    gap: 0;
    border: 0.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    overflow: hidden;
    min-height: 520px;
  }
  .sidebar {
    width: 210px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    background: var(--bg-secondary);
    padding: 8px;
  }
  .sitem {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px;
    border-radius: var(--radius-md);
    cursor: pointer;
    margin-bottom: 2px;
    transition: background .12s;
    border: 0.5px solid transparent;
  }
  .sitem:hover { background: var(--bg-primary); }
  .sitem.active {
    background: var(--bg-primary);
    border-color: var(--border-secondary);
  }
  .snum {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-tertiary);
    margin-top: 1px;
    flex-shrink: 0;
    width: 16px;
  }
  .sname {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .ssub {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 1px;
    line-height: 1.3;
  }

  .main {
    flex: 1;
    min-width: 0;
    padding: 20px;
    background: var(--bg-primary);
    overflow-y: auto;
  }
  .step-head {
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .step-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .step-num-big {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .step-name-big {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .step-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .flag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .flag {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .sections {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 640px) {
    .sections { grid-template-columns: 1fr; }
    .root { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 0.5px solid var(--border); }
  }
  .sec {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
  }
  .sec-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .04em;
    color: var(--text-secondary);
    margin-bottom: 10px;
    padding-bottom: 7px;
    border-bottom: 0.5px solid var(--border);
  }
  .ci {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    margin-bottom: 8px;
  }
  .ci:last-child { margin-bottom: 0; }
  .cdot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .ctext {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .ctext b {
    font-weight: 500;
    color: var(--text-primary);
  }
</style>
</head>
<body>

<h1>Event Networking Platform Development/Usage Flow</h1>
<p class="subtitle">Virtual Event Networking Platform: detailed considerations for every flow step</p>

<div class="tab-row">
  <button class="ttab active" onclick="switchJourney('org', this)">Event Organizer</button>
  <button class="ttab" onclick="switchJourney('att', this)">Attendee</button>
  <button class="ttab" onclick="switchJourney('spo', this)">Sponsor</button>
</div>

<div class="root">
  <div class="sidebar" id="step-list"></div>
  <div class="main" id="main-panel"></div>
</div>

<script>
const journeys = {

          {t:'Agenda data model', b:'Agenda items should be a child table (event_id FK, title, speaker, start_time, end_time, room/track). This powers the schedule view and the post-session networking bridge feature.'},

        ],
        biz:[
          {t:'Onboarding friction', b:'The easier setup is, the faster organizers activate. Every extra required field in the wizard costs conversion. Only collect what is strictly needed at creation — the rest can be filled in later.'},
          {t:'SaaS tier gating', b:'Feature limits (max attendees, number of sponsors, analytics depth) should be visible during setup so organizers upgrade before hitting walls mid-event.'},
          {t:'Event URL & branding', b:'Give each event a clean vanity URL (platform.com/events/your-event-name) and allow logo/color customization. This is a core selling point for premium tiers.'},
        ],
        flags:['Critical path','First impression','Blocks everything downstream']

      {
        num:'02', name:'Set up registration', sub:'Tickets & data fields',

        ux:[

          {t:'Data schema flexibility', b:'Custom fields need a JSON column (or EAV table) on the attendee_profile table so organizers can define arbitrary fields without schema migrations. Fields must be indexable for matchmaking queries.'},

          {t:'Conversion tracking', b:'Track registration funnel: page views → checkout started → payment completed → profile completed. Drop-off at each stage points to specific friction to fix.'},

        ],
        flags:['Revenue critical','Data quality gate','GDPR required']
      },
      {
        num:'03', name:'Manage sponsors', sub:'Profiles & visibility tiers',
        desc:'Organizers onboard sponsors and configure their tier of visibility. Sponsor quality and placement directly impacts attendee trust in the platform. This step is also a significant revenue driver through premium placement upsells.',
        ux:[
          {t:'Sponsor invite flow', b:'Organizers should be able to send an invite link to sponsors who self-complete their profile. Reduces organizer admin burden and gives sponsors ownership of their brand presence.'},
          {t:'Visibility tier preview', b:'Show organizers a live preview of what each sponsor tier looks like on the networking map, AI feed, and leaderboard. Make the value of upgrading immediately visible.'},
          {t:'Rep management', b:'Sponsors need to add multiple attending reps, each with their own profile and meeting availability. Reps are the real humans attendees connect with.'},

        desc:'The attendee lands on the event page, reviews ticket options, and completes purchase. This is the first brand touchpoint — first impressions of speed, clarity, and trust determine whether they bother completing their profile, which is the most critical next step.',

let currentJourney = 'org';
let currentStep = 0;

function renderSidebar(j) {
  const data = journeys[j];
  document.getElementById('step-list').innerHTML = data.steps.map((s, i) => `
    <div class="sitem${i === currentStep ? ' active' : ''}" onclick="selectStep(${i})">
      <div class="snum">${s.num}</div>
      <div><div class="sname">${s.name}</div><div class="ssub">${s.sub}</div></div>
    </div>`).join('');
}

function renderMain(j, idx) {
  const data = journeys[j];
  const s = data.steps[idx];
  const sections = [
    { title: 'UX CONSIDERATIONS', dot: '#378ADD', items: s.ux },
    { title: 'TECHNICAL CONSIDERATIONS', dot: '#7F77DD', items: s.tech },
    { title: 'BUSINESS & PRODUCT', dot: '#1D9E75', items: s.biz }
  ];
  document.getElementById('main-panel').innerHTML = `
    <div class="step-head">
      <div class="step-title-row">
        <span class="step-num-big" style="background:${data.bg};color:${data.textColor}">${s.num}</span>
        <span class="step-name-big">${s.name}</span>
      </div>
      <div class="step-desc">${s.desc}</div>
      <div class="flag-row">${s.flags.map(f => `<span class="flag" style="background:${data.bg};color:${data.textColor}">${f}</span>`).join('')}</div>
    </div>
    <div class="sections">
      ${sections.map(sec => `
        <div class="sec">
          <div class="sec-title">${sec.title}</div>
          ${sec.items.map(item => `
            <div class="ci">
              <div class="cdot" style="background:${sec.dot}"></div>
              <div class="ctext"><b>${item.t}</b> — ${item.b}</div>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;
}

function selectStep(idx) {
  currentStep = idx;
  renderSidebar(currentJourney);
  renderMain(currentJourney, idx);
}

function switchJourney(j, el) {
  currentJourney = j;
  currentStep = 0;
  document.querySelectorAll('.ttab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderSidebar(j);
  renderMain(j, 0);
}

renderSidebar('org');
renderMain('org', 0);
